<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CYPH3RFR0G | Portfolio</title>
    <style>
        :root {
            --bg-color: #0a0a0a;
            --card-bg: #111111;
            --border-color: #222222;
            --text-main: #eeeeee;
            --text-muted: #888888;
            --accent-color: #a855f7; 
            --accent-glow: rgba(168, 85, 247, 0.1);
            --font-mono: 'JetBrains Mono', 'Fira Code', monospace;
        }
        body { background-color: var(--bg-color); color: var(--text-main); font-family: var(--font-mono); margin: 0; padding: 40px 20px; display: flex; justify-content: center; }
        .container { max-width: 800px; width: 100%; }
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 60px; }
        nav a { color: var(--text-muted); text-decoration: none; margin-left: 20px; font-size: 0.9rem; transition: color 0.2s; }
        nav a:hover { color: var(--accent-color); }
        h1 { font-size: 2.2rem; margin-bottom: 20px; letter-spacing: -1px; text-transform: uppercase; }
        .intro p { color: var(--text-muted); line-height: 1.6; margin-bottom: 25px; }
        .cursor { display: inline-block; width: 10px; height: 1.2rem; background-color: var(--accent-color); margin-left: 4px; vertical-align: middle; animation: blink 1s step-end infinite; }
        @keyframes blink { from, to { opacity: 1; } 50% { opacity: 0; } }
        .section-header { display: flex; justify-content: space-between; align-items: baseline; margin-top: 50px; margin-bottom: 20px; }
        .section-header h2 { font-size: 1.2rem; font-weight: normal; }
        .card { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 8px; padding: 20px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; text-decoration: none; color: inherit; transition: all 0.2s; }
        .card:hover { border-color: var(--accent-color); background: var(--accent-glow); transform: translateX(5px); }
        .card-info h3 { margin: 0 0 5px 0; font-size: 1rem; color: var(--accent-color); }
        .card-info p { margin: 0; color: var(--text-muted); font-size: 0.85rem; }
        .meta { font-size: 0.8rem; color: var(--text-muted); }
        .dot { width: 10px; height: 10px; border-radius: 50%; margin-right: 8px; background: var(--accent-color); display: inline-block; }
    </style>
</head>
<body>
<div class="container">
    <header>
        <div style="display: flex; align-items: center; gap: 10px;">
            <div style="width: 24px; height: 24px; background: var(--accent-color); border-radius: 4px;"></div> 
            <span><strong id="brand-name">CYPH3RFR0G</strong><span class="cursor"></span></span>
        </div>
        <nav>
            <a href="#blog">Blog</a>
            <a href="#projects">Projects</a>
        </nav>
    </header>

    <section class="intro">
        <h1>CYPH3RFR0G</h1>
        <p>Hey there, I'm CYPH3RFR0G! I'm a 16-year-old student, cloud engineer, developer, and security enthusiast.</p>
        <div style="font-size: 0.9rem;">
            <a href="https://github.com/nils-112358" style="color:white; text-decoration:none; border-bottom:1px solid #333">GitHub</a>
        </div>
    </section>

    <div class="section-header" id="blog"><h2>Latest Blog Posts</h2></div>
    <div id="blog-container"></div>

    <div class="section-header" id="projects"><h2>Top Projects</h2></div>
    <div id="repo-container"></div>
</div>

<script>
    // Branding Animation
    const brandName = document.getElementById('brand-name');
    let isDeleting = true;
    setInterval(() => {
        brandName.textContent = isDeleting ? "CYPH3RFR0" : "CYPH3RFR0G";
        isDeleting = !isDeleting;
    }, 3000);

    // Load Blogs from JSON file
    async function loadBlogs() {
        try {
            const res = await fetch('blogs.json');
            const blogs = await res.json();
            const container = document.getElementById('blog-container');
            container.innerHTML = '';
            blogs.forEach(post => {
                container.innerHTML += `
                    <div class="card">
                        <div class="card-info">
                            <h3>${post.title}</h3>
                            <p>${post.excerpt}</p>
                        </div>
                        <div class="meta">${post.date}</div>
                    </div>`;
            });
        } catch(e) { console.log("No blogs found yet."); }
    }

    // GitHub API
    async function fetchRepos() {
        const res = await fetch(`https://api.github.com/users/nils-112358/repos?sort=updated`);
        const repos = await res.json();
        const top = repos.sort((a,b) => b.stargazers_count - a.stargazers_count).slice(0,3);
        const container = document.getElementById('repo-container');
        top.forEach(repo => {
            container.innerHTML += `
                <a href="${repo.html_url}" target="_blank" class="card">
                    <div class="card-info">
                        <h3>${repo.name}</h3>
                        <p>${repo.description || 'No description'}</p>
                    </div>
                    <div class="meta"><span class="dot"></span>${repo.language || 'Code'}</div>
                </a>`;
        });
    }
    loadBlogs();
    fetchRepos();
</script>
</body>
</html>

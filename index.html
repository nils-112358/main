<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>cypherfrog | Portfolio</title>
    <style>
        :root {
            --bg-color: #0a0a0a;
            --card-bg: #111111;
            --border-color: #222222;
            --text-main: #eeeeee;
            --text-muted: #888888;
            --accent-color: #58a6ff;
            --font-mono: 'JetBrains Mono', 'Fira Code', 'Courier New', monospace;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: var(--font-mono);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }

        .container { max-width: 800px; width: 100%; }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 60px;
        }

        nav a {
            color: var(--text-muted);
            text-decoration: none;
            margin-left: 20px;
            font-size: 0.9rem;
        }

        h1 { font-size: 2.2rem; margin-bottom: 20px; letter-spacing: -1px; }
        
        .intro p {
            color: var(--text-muted);
            line-height: 1.6;
            margin-bottom: 20px;
            max-width: 600px;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-top: 50px;
            margin-bottom: 20px;
        }

        .section-header h2 { font-size: 1.2rem; font-weight: normal; }
        .view-all { color: var(--text-muted); text-decoration: underline; font-size: 0.8rem; }

        /* Repository Cards */
        .repo-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            text-decoration: none;
            color: inherit;
            transition: transform 0.1s, border-color 0.2s;
        }

        .repo-card:hover {
            border-color: #444;
            transform: translateY(-2px);
        }

        .repo-info h3 { margin: 0 0 5px 0; font-size: 1rem; color: var(--accent-color); }
        .repo-info p { margin: 0; color: var(--text-muted); font-size: 0.85rem; }

        .repo-lang { display: flex; align-items: center; font-size: 0.85rem; color: var(--text-muted); }
        .dot { width: 10px; height: 10px; border-radius: 50%; margin-right: 8px; background: #888; }

        .social-links { margin-top: 30px; font-size: 0.9rem; }
        .social-links a { color: var(--text-main); text-decoration: none; margin-right: 15px; border-bottom: 1px solid #333; }

        #loading { color: var(--text-muted); font-style: italic; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div style="display: flex; align-items: center; gap: 10px;">
            <div style="width: 24px; height: 24px; background: var(--accent-color); border-radius: 4px;"></div> 
            <span><strong>cypherfrog</strong></span>
        </div>
        <nav>
            <a href="#">Blog</a>
            <a href="#projects">Projects</a>
            <a href="#">About</a>
        </nav>
    </header>

    <section class="intro">
        <h1>cypherfrog</h1>
        <p>
            Hey there, I'm cypherfrog! I'm a cloud engineer, developer, and security enthusiast. 
            I love open source and exploring everything related to cyber security.
        </p>
        <div class="social-links">
            Find me on <a href="https://github.com/nils-112358" target="_blank">GitHub</a>, <a href="#">Discord</a> and <a href="#">X</a>.
        </div>
    </section>

    <div class="section-header" id="projects">
        <h2>Top Projects</h2>
        <a href="https://github.com/nils-112358?tab=repositories" target="_blank" class="view-all">See all projects</a>
    </div>

    <div id="repo-container">
        <p id="loading">Lade Repositories von GitHub...</p>
    </div>
</div>

<script>
    const GITHUB_USERNAME = 'nils-112358';
    const repoContainer = document.getElementById('repo-container');

    async function fetchRepos() {
        try {
            // Holt alle Repos des Users
            const response = await fetch(`https://api.github.com/users/${GITHUB_USERNAME}/repos?sort=updated`);
            const repos = await response.json();

            // Sortiert nach Stars (absteigend) und nimmt die Top 3
            const topRepos = repos
                .sort((a, b) => b.stargazers_count - a.stargazers_count)
                .slice(0, 3);

            repoContainer.innerHTML = ''; // Loading Text entfernen

            topRepos.forEach(repo => {
                const card = document.createElement('a');
                card.href = repo.html_url;
                card.target = "_blank";
                card.className = 'repo-card';

                card.innerHTML = `
                    <div class="repo-info">
                        <h3>${repo.name}</h3>
                        <p>${repo.description || 'No description available'}</p>
                    </div>
                    <div class="repo-lang">
                        <span class="dot"></span>
                        ${repo.language || 'Plain Text'}
                    </div>
                `;
                repoContainer.appendChild(card);
            });
        } catch (error) {
            repoContainer.innerHTML = '<p style="color: red;">Fehler beim Laden der Projekte.</p>';
            console.error(error);
        }
    }

    fetchRepos();
</script>

</body>
</html>
